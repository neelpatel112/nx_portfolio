<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neelkumar Patel | 3D Portfolio</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Space Grotesk', sans-serif; }
        
        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
            color: white;
        }
        
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,77,109,0.3);
            border-top-color: #ff4d6d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* UI Overlay */
        #ui-overlay {
            position: fixed;
            top: 30px;
            left: 30px;
            color: white;
            z-index: 100;
            font-size: 1.5rem;
            font-weight: 700;
            text-shadow: 0 0 20px #ff4d6d;
        }
        
        .nav-dots {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
        }
        
        .nav-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            margin: 15px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-dot.active {
            background: #ff4d6d;
            box-shadow: 0 0 20px #ff4d6d;
            transform: scale(1.3);
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loading">
        <div class="loader"></div>
        <div style="font-size: 1.2rem; background: linear-gradient(45deg, #ff4d6d, #4361ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
            INITIALIZING 3D ENGINE...
        </div>
    </div>

    <!-- UI Overlay -->
    <div id="ui-overlay">NP<span style="color: #ff4d6d;">.</span></div>
    
    <div class="nav-dots">
        <div class="nav-dot active"></div>
        <div class="nav-dot"></div>
        <div class="nav-dot"></div>
        <div class="nav-dot"></div>
        <div class="nav-dot"></div>
    </div>

    <!-- Import Three.js from CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <!-- Your 3D Code - ALL IN ONE FILE -->
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';
        
        console.log('🚀 3D Starting...');
        
        // ===== SETUP =====
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 10);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);
        
        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1;
        controls.enableZoom = true;
        controls.target.set(0, 1, 0);
        
        // ===== LIGHTS =====
        // Ambient
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        // Main light
        const dirLight = new THREE.DirectionalLight(0xfff5e6, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);
        
        // Colored lights
        const pinkLight = new THREE.PointLight(0xff4d6d, 1, 20);
        pinkLight.position.set(-3, 2, 4);
        scene.add(pinkLight);
        
        const blueLight = new THREE.PointLight(0x4361ee, 1, 20);
        blueLight.position.set(4, 1, -3);
        scene.add(blueLight);
        
        // ===== MAIN ISLAND =====
        const islandGroup = new THREE.Group();
        
        // Base
        const baseGeo = new THREE.CylinderGeometry(2.5, 3, 0.4, 32);
        const baseMat = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a2a,
            emissive: 0x111122,
            roughness: 0.4,
            metalness: 0.3
        });
        const base = new THREE.Mesh(baseGeo, baseMat);
        base.receiveShadow = true;
        base.castShadow = true;
        base.position.y = 0;
        islandGroup.add(base);
        
        // Glow ring
        const ringGeo = new THREE.TorusGeometry(2.8, 0.1, 16, 64);
        const ringMat = new THREE.MeshStandardMaterial({ 
            color: 0xff4d6d,
            emissive: 0xff4d6d,
            transparent: true,
            opacity: 0.3
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2;
        ring.position.y = 0.2;
        islandGroup.add(ring);
        
        // Center crystal
        const crystalGeo = new THREE.OctahedronGeometry(0.8);
        const crystalMat = new THREE.MeshStandardMaterial({ 
            color: 0xff4d6d,
            emissive: 0x441122,
            roughness: 0.2,
            metalness: 0.8
        });
        const crystal = new THREE.Mesh(crystalGeo, crystalMat);
        crystal.castShadow = true;
        crystal.receiveShadow = true;
        crystal.position.y = 1.2;
        islandGroup.add(crystal);
        
        // Floating orbs
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const orbGeo = new THREE.SphereGeometry(0.15, 8);
            const orbMat = new THREE.MeshStandardMaterial({ 
                color: i % 2 === 0 ? 0xff4d6d : 0x4361ee,
                emissive: i % 2 === 0 ? 0x331111 : 0x111133
            });
            const orb = new THREE.Mesh(orbGeo, orbMat);
            orb.castShadow = true;
            orb.position.set(
                Math.cos(angle) * 2,
                1.5 + Math.sin(angle * 2) * 0.3,
                Math.sin(angle) * 2
            );
            islandGroup.add(orb);
        }
        
        scene.add(islandGroup);
        
        // ===== FLOATING ISLANDS =====
        const islands = [
            { color: 0xff4d6d, pos: [-4, 0.5, -3], size: 1.5 }, // Skills
            { color: 0x4361ee, pos: [4, 0.8, -2.5], size: 1.8 }, // Projects
            { color: 0x7209b7, pos: [-3, 0.2, -6], size: 1.4 }, // Certs
            { color: 0x4cc9f0, pos: [3.5, 0.4, -5], size: 1.3 } // Contact
        ];
        
        islands.forEach((island, index) => {
            const group = new THREE.Group();
            
            // Base
            const geo = new THREE.CylinderGeometry(island.size, island.size * 1.2, 0.3, 16);
            const mat = new THREE.MeshStandardMaterial({ 
                color: island.color,
                emissive: new THREE.Color(island.color).multiplyScalar(0.3)
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.receiveShadow = true;
            mesh.castShadow = true;
            group.add(mesh);
            
            // Ring
            const rGeo = new THREE.TorusGeometry(island.size * 1.1, 0.05, 8, 32);
            const rMat = new THREE.MeshStandardMaterial({ 
                color: island.color,
                emissive: island.color,
                transparent: true,
                opacity: 0.4
            });
            const ring = new THREE.Mesh(rGeo, rMat);
            ring.rotation.x = Math.PI / 2;
            ring.position.y = 0.1;
            group.add(ring);
            
            group.position.set(island.pos[0], island.pos[1], island.pos[2]);
            scene.add(group);
        });
        
        // ===== PARTICLES =====
        const particleCount = 1500;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        
        for (let i = 0; i < particleCount * 3; i += 3) {
            const r = 10 + Math.random() * 15;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            
            particlePositions[i] = r * Math.sin(phi) * Math.cos(theta);
            particlePositions[i+1] = r * Math.sin(phi) * Math.sin(theta);
            particlePositions[i+2] = r * Math.cos(phi);
        }
        
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        
        const particleMat = new THREE.PointsMaterial({
            color: 0x88aaff,
            size: 0.08,
            transparent: true,
            blending: THREE.AdditiveBlending
        });
        
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);
        
        // ===== GROUND FOG =====
        scene.fog = new THREE.FogExp2(0x0a0a0f, 0.02);
        
        // ===== HIDE LOADING AFTER 2 SECONDS =====
        setTimeout(() => {
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
            }, 1000);
        }, 2000);
        
        // ===== ANIMATION LOOP =====
        function animate() {
            requestAnimationFrame(animate);
            
            // Rotate main crystal
            crystal.rotation.y += 0.01;
            crystal.rotation.x += 0.005;
            
            // Float islands
            islands.forEach((island, i) => {
                const obj = scene.children.find(c => 
                    c.position.x === island.pos[0] && 
                    c.position.y === island.pos[1] && 
                    c.position.z === island.pos[2]
                );
                if (obj) {
                    obj.position.y = island.pos[1] + Math.sin(Date.now() * 0.002 + i) * 0.2;
                }
            });
            
            // Rotate particles
            particles.rotation.y += 0.0002;
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
        
        // ===== RESIZE HANDLER =====
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('✅ 3D Ready!');
    </script>
</body>
</html>
