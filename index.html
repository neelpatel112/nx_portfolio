<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neelkumar Patel | 3D Portfolio</title>
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loader"></div>
        <div class="loading-text">NEELKUMAR PATEL</div>
        <div class="loading-subtext">Loading 3D Experience...</div>
    </div>

    <!-- UI Overlay -->
    <div class="ui-overlay">
        <!-- Header -->
        <header class="header">
            <div class="logo">NP<span class="logo-dot">.</span></div>
            <nav class="desktop-nav">
                <a href="#" data-section="hero">Home</a>
                <a href="#" data-section="skills">Skills</a>
                <a href="#" data-section="projects">Projects</a>
                <a href="#" data-section="certs">Certs</a>
                <a href="#" data-section="contact">Contact</a>
            </nav>
            <div class="menu-btn">
                <span></span><span></span><span></span>
            </div>
        </header>

        <!-- Mobile Menu -->
        <div class="mobile-menu">
            <a href="#" data-section="hero">Home</a>
            <a href="#" data-section="skills">Skills</a>
            <a href="#" data-section="projects">Projects</a>
            <a href="#" data-section="certs">Certifications</a>
            <a href="#" data-section="contact">Contact</a>
        </div>

        <!-- Navigation Dots -->
        <div class="nav-dots">
            <div class="nav-dot active" data-section="hero"></div>
            <div class="nav-dot" data-section="skills"></div>
            <div class="nav-dot" data-section="projects"></div>
            <div class="nav-dot" data-section="certs"></div>
            <div class="nav-dot" data-section="contact"></div>
        </div>

        <!-- Project Modal -->
        <div class="modal" id="projectModal">
            <div class="modal-content">
                <button class="modal-close"><i class="fas fa-times"></i></button>
                <h2 id="modalTitle">Project Title</h2>
                <div class="modal-tech" id="modalTech"></div>
                <p id="modalDesc"></p>
                <div class="modal-date" id="modalDate"></div>
                <div class="modal-links">
                    <a href="#" class="btn primary" id="modalLive" target="_blank"><i class="fas fa-external-link-alt"></i> Live Demo</a>
                    <a href="#" class="btn secondary" id="modalGithub" target="_blank"><i class="fab fa-github"></i> GitHub</a>
                </div>
            </div>
        </div>

        <!-- Certificate Modal -->
        <div class="modal" id="certModal">
            <div class="modal-content">
                <button class="modal-close"><i class="fas fa-times"></i></button>
                <h2 id="certTitle">Certificate Title</h2>
                <div class="cert-issuer" id="certIssuer"></div>
                <div class="cert-date" id="certDate"></div>
                <p id="certDesc"></p>
            </div>
        </div>
    </div>

    <!-- Three.js Import -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <!-- Our JS Files -->
    <script type="module" src="js/content.js"></script>
    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
